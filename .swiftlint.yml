# SwiftLint config for the SwiftUIPlayground app.
# CI runs it (non-strict) in .github/workflows/ci.yml — warnings annotate the PR,
# only error-severity violations fail the build.
# Teaching reference: docs/cicd/part-12-static-analysis.md

disabled_rules:
  - todo                      # TODOs tracked elsewhere; don't fail the build on them

opt_in_rules:                 # valuable rules that are off by default
  - empty_count
  - first_where
  - sorted_imports
  - closure_spacing
  - redundant_nil_coalescing

included:
  - SwiftUIPlayground         # the app sources
  - SwiftUIPlaygroundTests    # the test sources

excluded:
  - "**/.build"
  - "**/DerivedData"

line_length:
  warning: 120
  error: 200                  # warn early, only fail on egregiously long lines

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 60
  error: 200

identifier_name:
  min_length: 2                             # allow short, idiomatic names like `id`, `vm`
  excluded: [ id, vm, x, y ]
  validates_start_with_lowercase: warning   # SwiftUI @ViewBuilder funcs (FooView()) → warn, don't fail

force_try:
  severity: warning           # flag `try!` as a warning, not a build-breaking error

reporter: "github-actions-logging"   # annotate violations inline in the Actions UI
