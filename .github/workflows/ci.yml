# CI — runs on feature pushes and PRs into main.
# Wired to THIS repo: SwiftUIPlayground.xcodeproj, scheme "SwiftUIPlayground".
# Teaching reference: docs/cicd/part-04-github-actions.md

name: CI

on:
  push:
    branches: [ "feature/**", "bugfix/**", "main" ]
    paths-ignore: [ "docs/**", "**.md" ]      # don't burn macOS minutes on docs edits
  pull_request:
    branches: [ "main" ]

# A newer commit on the same branch/PR cancels the older, still-running build.
# macOS minutes are ~10x Linux — don't pay for stale builds.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege (Part 23): read code; allow Danger to comment on PRs.
permissions:
  contents: read
  pull-requests: write

env:
  PROJECT: "SwiftUIPlayground.xcodeproj"
  SCHEME: "SwiftUIPlayground"

jobs:
  # 1) Cheapest check first — lint. Runs in parallel with build.
  #    Non-strict: warnings annotate the PR, only error-severity rules fail (see .swiftlint.yml).
  lint:
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: SwiftLint
        run: |
          brew install swiftlint
          swiftlint lint --quiet

  # 2) Compile the app. No `needs:` -> runs in parallel with lint.
  #    NOTE: this builds the app target. Running the unit tests needs the
  #    ComposableArchitecture SPM package wired into the project first
  #    (SwiftUIPlaygroundTests imports it) — switch `build` to `test` once it is.
  build:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination 'generic/platform=iOS Simulator' \
            -quiet

  # 3) PR automation. Only on PRs, only after lint + build pass.
  danger:
    needs: [ lint, build ]
    if: github.event_name == 'pull_request'
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true                 # installs Gemfile gems and caches them
      - name: Run Danger
        run: bundle exec danger
        env:
          DANGER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
