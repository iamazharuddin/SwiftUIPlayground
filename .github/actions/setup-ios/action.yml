# Composite action: shared iOS build-env setup (Xcode + Ruby/bundler + SPM cache).
# Removes copy-pasted setup from every workflow. Caller does its own checkout first.
# Teaching reference: docs/cicd/part-22-performance.md
#
# Usage:
#   - uses: actions/checkout@v4
#   - uses: ./.github/actions/setup-ios
#     with: { xcode-version: "16.0" }

name: "Setup iOS build env"
description: "Selects Xcode, sets up Ruby + bundler cache, restores the SPM cache"

inputs:
  xcode-version:
    description: "Xcode version to select"
    required: false
    default: "16.0"

runs:
  using: "composite"
  steps:
    - name: Select Xcode
      shell: bash
      run: sudo xcode-select -s "/Applications/Xcode_${{ inputs.xcode-version }}.app"

    - uses: ruby/setup-ruby@v1
      with:
        bundler-cache: true

    - name: Cache Swift Package Manager
      uses: actions/cache@v4
      with:
        path: ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
        key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
        restore-keys: spm-${{ runner.os }}-
